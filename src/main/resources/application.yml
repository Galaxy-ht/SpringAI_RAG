spring:
  application:
    name: SpringAI_RAG
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: 123456
  elasticsearch:
    uris: http://localhost:9200
    username: elastic
    password: 123456
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: ${DEEPSEEK_BASE_URL}
      chat:
        model: deepseek-v4-pro
        temperature: 0.3
        max-tokens: 5000
      embedding:
        api-key: ${DASHSCOPE_API_KEY}
        base-url: ${DASHSCOPE_BASE_URL}
        model: text-embedding-v2
        dimensions: 1536
    siliconflow:
      api-key: ${SILICONFLOW_API_KEY}
      base-url: https://api.siliconflow.cn/v1
      embedding:
        model: BAAI/bge-m3
        dimensions: 1024
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536
        initialize-schema: true
      qdrant:
        host: localhost
        port: 6334
        collection-name: spring_ai_rag
        use-tls: false
      milvus:
        host: localhost
        port: 19530
        database: default
        collection-name: spring_ai_rag
      elasticsearch:
        index-name: spring_ai_rag
    mcp:
      server:
        name: "SpringAI-RAG-MCP-Server"
        version: "1.0.0"
        protocol: STREAMABLE
        instructions: "该 MCP Server 提供 RAG 知识库搜索、数学计算、日期时间查询等工具"
      client:
        name: "SpringAI-RAG-MCP-Client"
        version: "1.0.0"
        request-timeout: 30s
        streamable-http:
          connections:
            # 示例：连接到外部 MCP Server（如 filesystem、web-search 等）
            # 取消注释并修改 URL 以连接到实际的 MCP Server
             filesystem:
               url: http://localhost:8000/mcp
# 应用自定义配置
app:
  embedding:
    active: dashscope
  fusion:
    rrf:
      k: 60
    weighted:
      alpha: 0.5
  vector-store:
    active: pgvector
    qdrant:
      enabled: true
    milvus:
      enabled: true
    elasticsearch:
      enabled: true

  agent:
    react:
      max-iterations: 10
    reflection:
      max-retries: 3
    planner:
      max-steps: 5
    multi:
      router:
        fallback-agent: reactAgent
      chain:
        default-chain: reactAgent,reflectionAgent
        max-chain-length: 5
      orchestrator:
        max-subtasks: 10
        max-concurrent-workers: 3